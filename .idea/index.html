<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="codeblock">

        <div class="toolbar">
            <button type="button" id="run-btn">–Ч–∞–њ—Г—Б—В–Є—В—М</button>
            <button type="button" id="debug-button">–Ю—В–ї–∞–і–Ї–∞</button>

            <div id ="trash-bin" class="trash-button">рЯЧСпЄП</div>
            <button type="button" id="preset-bubble-sort">–Я—Г–Ј—Л—А–µ–Ї</button>
            <button type="button" id="preset-gcd">–Э–Ю–Ф –Х–≤–Ї–ї–Є–і</button>
        </div>

        <div class="editor">
            <div class="instruction_set">
                <h2>–С–ї–Њ–Ї–Є</h2>
                <div class="instructions">

                    <button class="instruction" data-block-type="variable" type="button">–°–Њ–Ј–і–∞—В—М –І–Є—Б–ї–Њ–≤—Г—О –Я–µ—А–µ–Љ–µ–љ–љ—Г—О</button>

                    <button class="instruction" data-block-type="string_variable" type="button">–°–Њ–Ј–і–∞—В—М –°—В—А–Њ–Ї–Њ–≤—Г—О –Я–µ—А–µ–Љ–µ–љ–љ—Г—О</button>

                    <button class="instruction" data-block-type="boolean_variable" type="button">–°–Њ–Ј–і–∞—В—М –С—Г–ї–µ–≤—Г—О –Я–µ—А–µ–Љ–µ–љ–љ—Г—О</button>

                    <button class="instruction" data-block-type="assignment" type="button">–Я—А–Є—Б–≤–∞–Є–≤–∞–љ–Є–µ</button>

                    <button class="instruction" data-block-type="if" type="button">If</button>

                    <button class="instruction" data-block-type="else" type="button">Else</button>

                    <button class="instruction" data-block-type="while" type="button">–¶–Є–Ї–ї While</button>

                    <button class="instruction" data-block-type="for" type="button">–¶–Є–Ї–ї For</button>

                    <button class="instruction" data-block-type="array" type="button">–°–Њ–Ј–і–∞—В—М –Ь–∞—Б—Б–Є–≤</button>

                    <button class="instruction" data-block-type="output" type="button">–Т—Л–≤–Њ–і</button>

                    <button class="instruction" data-block-type="function" type="button">–°–Њ–Ј–і–∞—В—М –§—Г–љ–Ї—Ж–Є—О</button>

                    <button class="instruction" data-block-type="return" type="button">Return</button>

                    <button class="instruction" data-block-type="call" type="button">–Т—Л–Ј–Њ–≤ –§—Г–љ–Ї—Ж–Є–Є</button>

                    <button class="instruction" data-block-type="nothing" type="button">рЯШґвАНрЯМЂпЄПрЯШґвАНрЯМЂпЄПрЯШґвАНрЯМЂпЄПрЯШґвАНрЯМЂпЄПрЯШґвАНрЯМЂпЄП</button>

                </div>

            </div>

            <div class="workspace">

            </div>

            <div class="debug-panel">
                <div id="console-log" class="debug-content"></div>
            </div>
        </div>
    </div>

    <script type='module' src="CreateInstructionBlock.js"></script>
    <script type="module" src="./run.js"></script>
    <script type='module' src="./preset.js"></script>
    <datalist id="variables-list"></datalist>
</body>
</html>
