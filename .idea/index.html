<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="codeblock">

        <header class="toolbar">
            <button type="button" id="run-btn">Запустить</button>
            <button type="button" id="debug-button">Отладка</button>
            <button type="button" id="step-button">Следующий шаг</button>
            <button type="button" id="clear-workspace">Очистить</button>
            <div id ="trash-bin" class="trash-button">🗑️</div>
            <button type="button" id="preset-bubble-sort">Пузырек</button>
            <button type="button" id="preset-gcd">НОД Евклид</button>
            <button type="button" id="preset-merge-sort">Слиянием</button>
        </header>

        <section class="editor">
            <div class="instruction_set">
                <h2>Блоки</h2>
                <ul class="instructions">

                    <li><button class="instruction" data-block-type="variable" type="button">Создать Числовую Переменную</button></li>

                    <li><button class="instruction" data-block-type="string_variable" type="button">Создать Строковую Переменную</button></li>

                    <li><button class="instruction" data-block-type="boolean_variable" type="button">Создать Булевую Переменную</button></li>

                    <li><button class="instruction" data-block-type="assignment" type="button">Присваивание</button></li>

                    <li><button class="instruction" data-block-type="floor" type="button">Округление Вниз</button></li>

                    <li><button class="instruction" data-block-type="ceil" type="button">Округление Вверх</button></li>

                    <li><button class="instruction" data-block-type="round" type="button">Округление</button></li>

                    <li><button class="instruction" data-block-type="tu_number" type="button">Конвентор В число</button></li>

                    <li><button class="instruction" data-block-type="tu_string" type="button">Конвентор В строку</button></li>

                    <li><button class="instruction" data-block-type="tu_boolean" type="button">Конвентор В бул</button></li>

                    <li><button class="instruction" data-block-type="ord" type="button">Ord</button></li>

                    <li><button class="instruction" data-block-type="char" type="button">Char</button></li>

                    <li><button class="instruction" data-block-type="if" type="button">Блок If</button></li>

                    <li><button class="instruction" data-block-type="else" type="button">Блок Else</button></li>

                    <li><button class="instruction" data-block-type="while" type="button">Цикл While</button></li>

                    <li><button class="instruction" data-block-type="for" type="button">Цикл For</button></li>

                    <li><button class="instruction" data-block-type="array" type="button">Создать Массив</button></li>
                    
                    <li><button class="instruction" data-block-type="slice" type="button">Срез массива</button></li>

                    <li><button class="instruction" data-block-type="output" type="button">Вывод</button></li>

                    <li><button class="instruction" data-block-type="function" type="button">Создать Функцию</button></li>

                    <li><button class="instruction" data-block-type="return" type="button">Return</button></li>

                    <li><button class="instruction" data-block-type="call" type="button">Вызов Функции</button></li>

                    <li><button class="instruction" data-block-type="nothing" type="button">😶‍🌫️😶‍🌫️😶‍🌫️😶‍🌫️😶‍🌫️</button></li>

                </ul>

            </div>

            <div class="workspace">

            </div>

            <div class="debug-panel">
                <div class="var-states">
                    <h4>Переменные:</h4>
                    <div id="var-list" class="var-list">Empty</div>
                </div>
                <h4>Консоль:</h4>
                <div id="console-log" class="debug-content"></div>
            </div>
        </section>
    </div>

    <script type='module' src="./CreateInstructionBlock.js"></script>
    <script type="module" src="./run.js"></script>
    <script type='module' src="./preset.js"></script>
    <script type="module" src="./Userpresets.js"></script>
    <datalist id="variables-list"></datalist>
</body>
</html>
