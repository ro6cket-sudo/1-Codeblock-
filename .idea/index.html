<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="codeblock">

        <div class="toolbar">
            <button type="button" id="run-btn">Р—Р°РҝСғСҒСӮРёСӮСҢ</button>
            <button type="button" id="clear-workspace">РһСҮРёСҒСӮРёСӮСҢ</button>
            <div id ="trash-bin" class="trash-button">рҹ—‘пёҸ</div>
            <button type="button" id="preset-bubble-sort">РҹСғР·СӢСҖРөРә</button>
            <button type="button" id="preset-gcd">РқРһР” Р•РІРәР»РёРҙ</button>
        </div>

        <div class="editor">
            <div class="instruction_set">
                <h2>Р‘Р»РҫРәРё</h2>
                <div class="instructions">

                    <button class="instruction" data-block-type="variable" type="button">РЎРҫР·РҙР°СӮСҢ РҹРөСҖРөРјРөРҪРҪСғСҺ</button>

                    <button class="instruction" data-block-type="assignment" type="button">РҹСҖРёСҒРІР°РёРІР°РҪРёРө</button>

                    <button class="instruction" data-block-type="if" type="button">If</button>

                    <button class="instruction" data-block-type="else" type="button">Else</button>

                    <button class="instruction" data-block-type="while" type="button">РҰРёРәР» While</button>

                    <button class="instruction" data-block-type="for" type="button">РҰРёРәР» For</button>

                    <button class="instruction" data-block-type="array" type="button">РЎРҫР·РҙР°СӮСҢ РңР°СҒСҒРёРІ</button>

                    <button class="instruction" data-block-type="output" type="button">Р’СӢРІРҫРҙ</button>

                    <button class="instruction" data-block-type="function" type="button">РЎРҫР·РҙР°СӮСҢ РӨСғРҪРәСҶРёСҺ</button>

                    <button class="instruction" data-block-type="return" type="button">Return</button>

                    <button class="instruction" data-block-type="call" type="button">Р’СӢР·РҫРІ РӨСғРҪРәСҶРёРё</button>

                    <button class="instruction" data-block-type="nothing" type="button">рҹҳ¶вҖҚрҹҢ«пёҸрҹҳ¶вҖҚрҹҢ«пёҸрҹҳ¶вҖҚрҹҢ«пёҸрҹҳ¶вҖҚрҹҢ«пёҸрҹҳ¶вҖҚрҹҢ«пёҸ</button>

                </div>

            </div>

            <div class="workspace">

            </div>

            <div class="debug-panel">
                <div id="console-log" class="debug-content"></div>
            </div>
        </div>
    </div>

    <script type='module' src="CreateInstructionBlock.js"></script>
    <script type="module" src="./run.js"></script>
    <script type='module' src="./preset.js"></script>
</body>
</html>
