<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="codeblock">

        <div class="toolbar">
            <button type="button" id="run-btn">Запустить</button>
            <button type="button" id="clear-workspace">Очистить</button>
            <div id ="trash-bin" class="trash-button">🗑️</div>
            <button type="button" id="preset-bubble-sort">Пузырек</button>
            <button type="button" id="preset-gcd">НОД Евклид</button>
            <button type="button" id="preset-merge-sort">Слиянием</button>
        </div>

        <div class="editor">
            <div class="instruction_set">
                <h2>Блоки</h2>
                <div class="instructions">

                    <button class="instruction" data-block-type="variable" type="button">Создать Числовую Переменную</button>

                    <button class="instruction" data-block-type="string_variable" type="button">Создать Строковую Переменную</button>

                    <button class="instruction" data-block-type="boolean_variable" type="button">Создать Булевую Переменную</button>

                    <button class="instruction" data-block-type="assignment" type="button">Присваивание</button>

                    <button class="instruction" data-block-type="if" type="button">If</button>

                    <button class="instruction" data-block-type="else" type="button">Else</button>

                    <button class="instruction" data-block-type="while" type="button">Цикл While</button>

                    <button class="instruction" data-block-type="for" type="button">Цикл For</button>

                    <button class="instruction" data-block-type="array" type="button">Создать Массив</button>

                    <button class="instruction" data-block-type="output" type="button">Вывод</button>

                    <button class="instruction" data-block-type="function" type="button">Создать Функцию</button>

                    <button class="instruction" data-block-type="return" type="button">Return</button>

                    <button class="instruction" data-block-type="call" type="button">Вызов Функции</button>

                    <button class="instruction" data-block-type="nothing" type="button">😶‍🌫️😶‍🌫️😶‍🌫️😶‍🌫️😶‍🌫️</button>

                </div>

            </div>

            <div class="workspace">

            </div>

            <div class="debug-panel">
                <div id="console-log" class="debug-content"></div>
            </div>
        </div>
    </div>

    <script type='module' src="CreateInstructionBlock.js"></script>
    <script type="module" src="./run.js"></script>
    <script type='module' src="./preset.js"></script>
    <datalist id="variables-list"></datalist>
</body>
</html>
