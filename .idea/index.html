<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="codeblock">

        <div class="toolbar">
            <button type="button" id="run-btn">Запустить</button>
            <button type="button" id="clear-workspace">Очистить</button>
            <div id ="trash-bin" class="trash-button">🗑️</div>
        </div>

        <div class="editor">
            <div class="instruction_set">
                <h2>Блоки</h2>
                <div class="instructions">

                    <button class="instruction" data-block-type="variable" type="button">Создать Переменную</button>

                    <button class="instruction" data-block-type="assignment" type="button">Присваивание</button>

                    <button class="instruction" data-block-type="if-else" type="button">Конструкция If-Else</button>

                    <button class="instruction" data-block-type="while" type="button">Цикл While</button>

                    <button class="instruction" data-block-type="for" type="button">Цикл For</button>

                    <button class="instruction" data-block-type="array" type="button">Создать Массив</button>

                    <button class="instruction" data-block-type="input" type="button">Ввод</button>

                    <button class="instruction" data-block-type="output" type="button">Вывод</button>

                </div>

            </div>

            <div class="workspace">

            </div>

            <div class="debug-panel">
                <div id="console-log" class="debug-content"></div>
            </div>
        </div>
    </div>

    <script type='module' src="CreateInstructionBlock.js"></script>
    <script type="module" src="./run.js"></script>
</body>
</html>
