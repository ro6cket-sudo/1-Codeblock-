<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CODEBLOCK</title>
</head>
<body>
    <div class="codeblock">

        <div class="toolbar">
            <button type="button">Запустить</button>
            <button type="button">Очистить</button>
        </div>

        <div class="editor">
            <div class="instruction set">
                <h5>Блоки</h5>
                <div class="instructions">

                    <div class="instruction">Создать Переменную</div>

                    <div class="instruction">Присваивание</div>

                    <div class="instruction">Конструкция If-Else</div>

                    <div class="instruction">Цикл While</div>

                    <div class="instruction">Цикл For</div>

                    <div class="instruction">Создать Массив</div>

                </div>
            </div>

            <div class="workspace">
                
            </div>

            <div class="debug panel">

            </div>

        </div>
    </div>
</body>
</html>
